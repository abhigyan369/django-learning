<h2>Select Course</h2>

<form method="post">
    {% csrf_token %}

    <select name="course">
        {% for course in courses %}
        <option value="{{ course.id }}">{{ course.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Show Students</button>
</form>

<ul>
    {% for student in students %}
    <li>{{ student.name }}</li>
    {% endfor %}
</ul>
